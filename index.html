<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>箱入り娘 パズル</title>
    <style>
        :root {
            --bg-color: #f7f3e9;
            --board-color: #8d6e63;
            --musume-color: #ef5350;
            --vertical-color: #ffca28;
            --horizontal-color: #9ccc65;
            --small-color: #4fc3f7;
            --text-color: #3e2723;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 確実にスクロールできるように、下に大きな余白（150px）を作りました */
            padding: 30px 0 150px 0;
            margin: 0;
            color: var(--text-color);
            /* ここには touch-action: none; を絶対に入れない（スクロール許可） */
        }

        h1 { margin-bottom: 5px; }
        .subtitle { 
            margin-top: 0; 
            font-size: 0.95rem; 
            margin-bottom: 15px; 
            color: #d32f2f; /* 反映されたか分かりやすいように赤色にしています */
            font-weight: bold;
        }
        .desc { font-size: 0.9rem; margin-bottom: 15px; text-align: center; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            width: 320px;
            margin-bottom: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #e7e0d3;
            padding: 8px 15px;
            border-radius: 8px;
            box-sizing: border-box;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .game-container {
            position: relative;
            background-color: var(--board-color);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .board {
            position: relative;
            width: 320px;
            height: 400px;
            background-color: #d7ccc8;
            border: 4px solid #5d4037;
            overflow: hidden;
            /* 盤面の中を触っている時だけはスクロールせず、コマの移動に集中させます */
            touch-action: none;
        }

        .piece {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 6px;
            box-sizing: border-box;
            border: 2px solid rgba(0,0,0,0.15);
            cursor: grab;
            transition: left 0.15s ease-out, top 0.15s ease-out, transform 0.1s;
            user-select: none;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.3), 2px 2px 5px rgba(0,0,0,0.2);
        }

        .piece:active {
            cursor: grabbing;
            transform: scale(0.96);
        }

        .musume { background-color: var(--musume-color); color: white; font-size: 1.5rem; z-index: 10; }
        .vertical { background-color: var(--vertical-color); }
        .horizontal { background-color: var(--horizontal-color); }
        .small { background-color: var(--small-color); }

        .exit-indicator {
            position: absolute;
            bottom: -8px;
            left: 80px;
            width: 160px;
            height: 16px;
            background-color: #ef5350;
            border-radius: 0 0 8px 8px;
            text-align: center;
            color: white;
            font-size: 10px;
            line-height: 16px;
            font-weight: bold;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            position: relative;
            z-index: 50;
        }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: var(--text-color);
            color: white;
            transition: background 0.2s;
        }

        button:hover { background-color: #5d4037; }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .overlay h2 { font-size: 3rem; margin-bottom: 20px; }
        .result-text { font-size: 1.5rem; line-height: 1.8; margin-bottom: 30px; }

        #confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            top: -20px;
            width: 10px;
            height: 20px;
            opacity: 0.8;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <div id="confetti-container"></div>

    <h1>箱入り娘</h1>

    <div class="status-bar">
        <div id="moveDisplay">手数: 0</div>
        <div id="timerDisplay">時間: 00:00</div>
    </div>

    <div class="game-container">
        <div class="board" id="board"></div>
        <div class="exit-indicator">出口</div>
    </div>

    <div class="controls">
        <button id="resetBtnMain">最初から</button>
    </div>

    <div class="overlay" id="winOverlay">
        <h2>祝・脱出成功！</h2>
        <div class="result-text" id="resultDisplayText"></div>
        <button id="resetBtnOverlay">もう一度遊ぶ</button>
    </div>

    <script>
        const CELL_SIZE = 80;
        const ROWS = 5;
        const COLS = 4;

        const initialPieces = [
            { id: 1, type: 'musume', x: 1, y: 0, w: 2, h: 2, label: '娘' },
            { id: 2, type: 'vertical', x: 0, y: 0, w: 1, h: 2, label: '父親' },
            { id: 3, type: 'vertical', x: 3, y: 0, w: 1, h: 2, label: '母親' },
            { id: 4, type: 'vertical', x: 0, y: 2, w: 1, h: 2, label: '兄弟' },
            { id: 5, type: 'vertical', x: 3, y: 2, w: 1, h: 2, label: '姉妹' },
            { id: 6, type: 'horizontal', x: 1, y: 2, w: 2, h: 1, label: '親戚' },
            { id: 7, type: 'small', x: 1, y: 3, w: 1, h: 1, label: '小僧' },
            { id: 8, type: 'small', x: 2, y: 3, w: 1, h: 1, label: '小僧' },
            { id: 9, type: 'small', x: 0, y: 4, w: 1, h: 1, label: '小僧' },
            { id: 10, type: 'small', x: 3, y: 4, w: 1, h: 1, label: '小僧' }
        ];

        let pieces = [];
        let moves = 0;
        
        let startTime = null;
        let timerInterval = null;
        let isGameStarted = false;

        document.getElementById('resetBtnMain').addEventListener('click', initGame);
        document.getElementById('resetBtnOverlay').addEventListener('click', initGame);

        function updateTimer() {
            if (!startTime) return;
            const elapsed = Date.now() - startTime;
            const totalSeconds = Math.floor(elapsed / 1000);
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `時間: ${minutes}:${seconds}`;
        }

        function startTimer() {
            if (isGameStarted) return;
            isGameStarted = true;
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function updateMoveDisplay() {
            document.getElementById('moveDisplay').innerText = `手数: ${moves}`;
        }

        function shootConfetti() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = '';
            const colors = ['#ef5350', '#ffca28', '#9ccc65', '#4fc3f7', '#ab47bc', '#ff7043'];
            
            for (let i = 0; i < 100; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const scale = Math.random() * 0.6 + 0.4;
                conf.style.width = (10 * scale) + 'px';
                conf.style.height = (20 * scale) + 'px';
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 0.5) + 's';
                
                container.appendChild(conf);
            }
        }

        function initGame() {
            stopTimer();
            isGameStarted = false;
            startTime = null;
            moves = 0;
            pieces = JSON.parse(JSON.stringify(initialPieces));
            
            document.getElementById('timerDisplay').innerText = `時間: 00:00`;
            updateMoveDisplay();
            document.getElementById('winOverlay').style.display = 'none';
            document.getElementById('confetti-container').innerHTML = ''; 
            
            render();
        }

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            pieces.forEach(p => {
                const div = document.createElement('div');
                div.className = `piece ${p.type}`;
                div.style.width = (p.w * CELL_SIZE) + 'px';
                div.style.height = (p.h * CELL_SIZE) + 'px';
                div.style.left = (p.x * CELL_SIZE) + 'px';
                div.style.top = (p.y * CELL_SIZE) + 'px';
                div.innerText = p.label;
                
                let startX = 0;
                let startY = 0;

                div.addEventListener('pointerdown', (e) => {
                    startX = e.clientX;
                    startY = e.clientY;
                    div.setPointerCapture(e.pointerId);
                    e.preventDefault();
                });

                div.addEventListener('pointerup', (e) => {
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    div.releasePointerCapture(e.pointerId);

                    if (Math.abs(dx) > 15 || Math.abs(dy) > 15) {
                        if (Math.abs(dx) > Math.abs(dy)) {
                            attemptMove(p, dx > 0 ? 1 : -1, 0);
                        } else {
                            attemptMove(p, 0, dy > 0 ? 1 : -1);
                        }
                    }
                });

                div.addEventListener('dragstart', (e) => e.preventDefault());

                board.appendChild(div);
            });
        }

        function attemptMove(piece, dx, dy) {
            if (canMove(piece, dx, dy)) {
                startTimer();
                piece.x += dx;
                piece.y += dy;
                moves++;
                updateMoveDisplay();
                render();
                checkWin();
            }
        }

        function canMove(piece, dx, dy) {
            const newX = piece.x + dx;
            const newY = piece.y + dy;

            if (newX < 0 || newY < 0 || (newX + piece.w) > COLS || (newY + piece.h) > ROWS) {
                return false;
            }

            for (const other of pieces) {
                if (other.id === piece.id) continue;
                if (
                    newX < other.x + other.w &&
                    newX + piece.w > other.x &&
                    newY < other.y + other.h &&
                    newY + piece.h > other.y
                ) {
                    return false;
                }
            }

            return true;
        }

        function checkWin() {
            const musume = pieces.find(p => p.type === 'musume');
            if (musume.x === 1 && musume.y === 3) {
                stopTimer();
                const finalTime = document.getElementById('timerDisplay').innerText.replace('時間: ', '');
                
                shootConfetti();
                
                setTimeout(() => {
                    document.getElementById('resultDisplayText').innerHTML = `クリアタイム： <b>${finalTime}</b><br>手数： <b>${moves} 手</b>`;
                    document.getElementById('winOverlay').style.display = 'flex';
                }, 600);
            }
        }

        initGame();
    </script>
</body>
</html>
